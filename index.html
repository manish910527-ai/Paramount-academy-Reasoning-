<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasoning Portal - Manish Sir</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; }
        .header { background-color: #002147; color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 5px 0 0; color: #ffcc00; font-weight: bold; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .question-box { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .question-text { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .option { display: block; padding: 10px; margin-bottom: 10px; background: #e9ecef; border-radius: 5px; cursor: pointer; }
        .exam-tag { display: inline-block; background-color: #ffe0b2; color: #e65100; padding: 5px 10px; font-size: 12px; font-weight: bold; border-radius: 4px; margin-top: 10px; }
        .submit-btn { background-color: #2e7d32; color: white; padding: 12px; width: 100%; font-size: 18px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Paramount Academy, Khandwa</h1>
        <p>Reasoning by Manish sir</p>
    </div>

    <div class="container" id="quiz-container">
        <!-- Google Sheet से प्रश्न यहाँ अपने आप आएँगे -->
        <p style="text-align:center;">प्रश्नों को लोड किया जा रहा है...</p>
    </div>

<script>
// आपका Apps Script URL यहाँ जोड़ दिया गया है
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxa7RsSqE3KWGiK-Bxk7G93hh6mP-8-2rG4evJdAYj437iW4eZkD0iCjhzVzUQODfMxpA/exec";

// Google Sheet से प्रश्न मँगाना
fetch(SHEET_API_URL)
    .then(response => response.json())
    .then(data => {
        let container = document.getElementById('quiz-container');
        container.innerHTML = ""; // 'लोड हो रहा है' को हटाएँ

        // Day 1 के प्रश्न फ़िल्टर करना (आप चाहें तो इसे बदल सकते हैं)
        let day1Questions = data.filter(q => q.Day === "Day 1");

        if(day1Questions.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:red;'>अभी कोई प्रश्न उपलब्ध नहीं है। कृपया Google Sheet चेक करें।</p>";
            return;
        }

        day1Questions.forEach((q, index) => {
            let html = `
                <div class="question-box">
                    <div class="question-text">Q${index + 1}. ${q.Question}</div>
                    <label class="option"><input type="radio" name="q${index}" value="A"> A) ${q.Option_A}</label>
                    <label class="option"><input type="radio" name="q${index}" value="B"> B) ${q.Option_B}</label>
                    <label class="option"><input type="radio" name="q${index}" value="C"> C) ${q.Option_C}</label>
                    <label class="option"><input type="radio" name="q${index}" value="D"> D) ${q.Option_D}</label>
                    
                    <!-- Exam का नाम और Date यहाँ दिखेगा -->
                    <div class="exam-tag">🏷️ ${q.Exam_Name} (${q.Exam_Date})</div>
                </div>
            `;
            container.innerHTML += html;
        });

        // Submit बटन जोड़ना
        container.innerHTML += `<button class="submit-btn" onclick="submitTest()">टेस्ट सबमिट करें</button>`;
    })
    .catch(error => {
        document.getElementById('quiz-container').innerHTML = "<p style='text-align:center; color:red;'>डेटा लोड करने में समस्या आ रही है। कृपया लिंक और शीट चेक करें।</p>";
    });

// रिज़ल्ट वापस Google Sheet में भेजना
function submitTest() {
    alert("आपका टेस्ट चेक हो रहा है... मार्क्स आपकी शीट में जा रहे हैं!");
    
    // डमी डेटा (बाद में इसे असली फॉर्म से रिप्लेस किया जा सकता है)
    let resultData = {
        name: "Student Name", 
        mobile: "9876543210",
        day: "Day 1",
        score: "15/20" 
    };

    fetch(SHEET_API_URL, {
        method: "POST",
        body: JSON.stringify(resultData)
    }).then(res => {
        alert("टेस्ट सफलतापूर्वक सबमिट हो गया!");
    }).catch(err => {
        alert("सबमिट करने में एरर आई।");
    });
}
</script>

</body>
</html>
