<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasoning Portal - Manish Sir</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; max-width: 500px; margin: auto; }
        .btn { background: #002147; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; margin-top: 15px; cursor: pointer; }
        #status-box { padding: 15px; margin-top: 20px; border-radius: 5px; font-weight: bold; font-size: 18px; }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🛠️ सिस्टम चेकर (System Checker)</h2>
        <p>मनीष सर, यह पेज बताएगा कि डेटा कहाँ अटक रहा है।</p>
        
        <div id="status-box" class="loading">
            ⏳ डेटा चेक किया जा रहा है, कृपया प्रतीक्षा करें...
        </div>

        <div id="detail-box" style="margin-top: 15px; font-size: 14px; color: #333; text-align: left;"></div>

        <button class="btn" onclick="location.reload()">फिर से चेक करें</button>
    </div>

<script>
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwrn1KhBZO055DnDoMjl4L-_MR41X3zGy-IHlsW6Tt8MQfzNnXFWnHYprtaH1E4AdJhmA/exec";
    const getFetchUrl = () => SHEET_API_URL + "?nocache=" + new Date().getTime();

    window.onload = function() {
        let statusBox = document.getElementById("status-box");
        let detailBox = document.getElementById("detail-box");

        fetch(getFetchUrl())
            .then(response => {
                if (!response.ok) throw new Error("Network Response was not OK");
                return response.json();
            })
            .then(data => { 
                if (data.length > 0) {
                    statusBox.className = "success";
                    statusBox.innerText = "✅ पास! डेटा सफलतापूर्वक ऐप में आ गया है।";
                    
                    // पहला प्रश्न चेक करना
                    let firstQ = data[0];
                    detailBox.innerHTML = `
                        <b>डेटा की रिपोर्ट:</b><br>
                        - कुल प्रश्न मिले: ${data.length}<br>
                        - पहले प्रश्न का Day: "${firstQ.Day}"<br>
                        - पहला प्रश्न: ${firstQ.Question}
                    `;
                } else {
                    statusBox.className = "error";
                    statusBox.innerText = "⚠️ डेटा आया, लेकिन उसमें 0 (शून्य) प्रश्न हैं!";
                    detailBox.innerHTML = "इसका मतलब शीट की हेडिंग्स सही नहीं हैं या शीट खाली है।";
                }
            })
            .catch(err => {
                statusBox.className = "error";
                statusBox.innerText = "❌ फेल! ऐप इंटरनेट से डेटा नहीं ले पा रहा है। (CORS / Fetch Error)";
                detailBox.innerHTML = `
                    <b>संभावित कारण:</b><br>
                    1. Apps Script को डिप्लॉय करते समय <b>"Execute as: Me"</b> और <b>"Who has access: Anyone"</b> नहीं चुना गया है।<br>
                    2. मोबाइल का ब्राउज़र लोकल फाइल को इंटरनेट से डेटा लेने से रोक रहा है।
                `;
            });
    }
</script>

</body>
</html>
